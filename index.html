<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blokko API Playground</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/0.24.0/axios.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .code-font { font-family: 'Consolas', 'Monaco', monospace; }
        pre { white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto bg-white rounded-lg shadow-lg overflow-hidden">
        
        <!-- Header -->
        <div class="bg-purple-800 p-6 text-white">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                Blokko API Playground
            </h1>
            <p class="opacity-80 mt-1">Test tool for HMAC-SHA256 integration</p>
        </div>

        <div class="p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Configuration (Left Column) -->
            <div class="space-y-4">
                <h2 class="text-lg font-semibold text-gray-800 border-b pb-2">1. Configuration</h2>

                <div>
                    <label class="block text-sm font-medium text-gray-800">Host URL</label>
                    <input type="text" id="hostUrl" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 border" value="https://sandbox.blokko.dev">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-800">API Key</label>
                    <input type="text" id="apiKey" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 border font-mono text-sm" value="aChi0fKOtV8Ap--T-3fN8LGUm-9w0mGIPaqbALeLfU9LhbA2ef-QfxVtIWNpF8jYT1Nf9FSP5Q3jloyV7LUWdQ">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-800">Secret Key</label>
                    <div>
                        <input type="text" id="secretKey" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 border font-mono text-sm" value="hEuwJc85nWHx1sQwmNpZbDFWFxu5WqBhGw7543gFRsY=">
                    </div>
                </div>
                
                <div class="pt-4">
                    <h3 class="text-sm font-semibold text-gray-800 mb-2">Endpoint Rápido</h3>
                    <div class="space-y-2">
                        <button onclick="loadTemplate('payment_intent')" class="w-full text-left px-4 py-2 bg-gray-50 hover:bg-gray-100 rounded border text-sm flex justify-between">
                            <span>Payment Intent</span>
                            <span class="text-purple-800 font-bold">POST</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Request Body (Center Column) -->
            <div class="lg:col-span-2 space-y-4 flex flex-col">
                <h2 class="text-lg font-semibold text-gray-800 border-b pb-2">2. Request</h2>

                <div class="grid grid-cols-4 gap-4">
                    <div class="col-span-1">
                        <label class="block text-sm font-medium text-gray-800">Verb</label>
                        <select id="method" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 border">
                            <option value="POST">POST</option>
                            <option value="GET">GET</option>
                            <option value="PUT">PUT</option>
                        </select>
                    </div>
                    <div class="col-span-3">
                        <label class="block text-sm font-medium text-gray-800">Endpoint Path</label>
                        <input type="text" id="path" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 border font-mono" value="/v2/payment-intent">
                    </div>

                    <div class="col-span-1"></div>
                    <div class="col-span-3">
                        <label class="block text-sm font-medium text-gray-800">Query</label>
                        <input type="text" id="queryString" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 border font-mono" value="">
                    </div>

                    <div class="col-span-1"></div>
                    <div class="col-span-3">
                        <label class="block text-sm font-medium text-gray-800">Timestamp</label>
                        <table class="w-full">
                            <tr>
                                <td>
                                    <input type="text" id="timestamp" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 border font-mono text-sm">
                                </td>
                                <td width="120" class="pl-2">
                                    <input type="button" value="Calculate" class="bg-purple-800 hover:bg-purple-800 text-white font-bold py-2 px-4 rounded shadow w-full cursor-pointer" onclick="calculateTimestamp()" />
                                </td>
                            </tr>
                        </table>
                    </div>

                    <div class="col-span-1"></div>
                    <div class="col-span-3">
                        <label class="block text-sm font-medium text-gray-800">Nonce</label>
                        <table class="w-full">
                            <tr>
                                <td>
                                    <input type="text" id="nonce" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 border font-mono text-sm">
                                </td>
                                <td width="120" class="pl-2">
                                    <input type="button" value="Calculate" class="bg-purple-800 hover:bg-purple-800 text-white font-bold py-2 px-4 rounded shadow w-full cursor-pointer" onclick="calculateNonce()" />
                                </td>
                            </tr>
                        </table>
                    </div>
                </div>

                <div class="flex-grow">
                    <label class="block text-sm font-medium text-gray-800 mb-1">JSON Payload</label>
                    <textarea id="jsonBody" class="w-full h-64 code-font text-sm p-4 border rounded-md bg-gray-900 text-green-400 focus:outline-none focus:ring-2 focus:ring-purple-500" spellcheck="false"></textarea>
                </div>

                <div class="grid grid-cols-1 gap-4 mb-4 text-xs font-mono">
                    <div>
                        <span class="text-gray-400 block">Generated Headers:</span>
                        <div id="debugHeaders" class="text-blue-800 mt-1 break-all bg-blue-50 p-2 rounded border border-blue-100">...</div>
                    </div>
                </div>

                <div class="flex items-center justify-between pt-2">
                    <p class="text-xs text-gray-500 italic">Signature calculated using Web Crypto API.</p>
                    <button onclick="sendRequest()" id="sendBtn" class="bg-purple-800 hover:bg-purple-800 text-white font-bold py-2 px-6 rounded shadow transition-colors flex items-center gap-2">
                        <span>Send Request</span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Result Console -->
        <div class="bg-gray-800 text-white p-6 border-t border-gray-800">
            <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                Response / Debug Logs
            </h2>
            
            <div class="grid grid-cols-2 gap-4 mb-4 text-xs font-mono">
                <div>
                    <span class="text-gray-400 block">Status:</span>
                    <div id="responseStatus" class="font-bold mt-1">---</div>
                </div>
            </div>

            <div class="bg-black rounded p-4 overflow-auto h-64 border border-gray-800">
                <pre id="responseOutput" class="code-font text-sm text-gray-300">Waiting for request...</pre>
            </div>
        </div>
    </div>

    <!-- Logic -->
    <script>
        // Templates
        const TEMPLATES = {
            payment_intent: {
                method: 'POST',
                path: '/v2/payment-intent',
                body: {
                  merchantTransactionId: "4aab7413-c0d5-49ed-80ce-4e7b83659885a6",
                  merchantReference: "eab48a03-bce5-4e64-87d2-af97b6f15a6",
                  terminalUuid:"TSDX611748604",
                  amount: "0.01",
                  paymentMethodId: "BCLN"
                }
            }
        };

        // Load Template
        function loadTemplate(type) {
            const t = TEMPLATES[type];
            document.getElementById('method').value = t.method;
            document.getElementById('path').value = t.path;

            // ADD THIS BLOCK: Generate new UUIDs when this template is loaded
            if (type === 'payment_intent') {
                t.body.merchantTransactionId = crypto.randomUUID();
                t.body.merchantReference = crypto.randomUUID();
            }

            if (t.body) {
                document.getElementById('jsonBody').value = JSON.stringify(t.body, null, 2);
            } else {
                document.getElementById('jsonBody').value = '';
            }
        }

        function calculateNonce() {
            const nonceField = document.getElementById('nonce');
            nonceField.value = crypto.randomUUID();
        }

        function calculateTimestamp() {
            const timestampField = document.getElementById('timestamp');
            const timestamp = Math.floor(Date.now() / 1000).toString();
            timestampField.value = timestamp;
        }

        // Init
        loadTemplate('payment_intent');
        calculateNonce();
        calculateTimestamp();

        // Send Request Function
        async function sendRequest() {
            const btn = document.getElementById('sendBtn');
            const output = document.getElementById('responseOutput');
            const statusDiv = document.getElementById('responseStatus');
            const debugDiv = document.getElementById('debugHeaders');

            // UI Loading
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            output.innerText = "Processing...";
            statusDiv.innerText = "Sending...";
            output.classList.remove('text-red-400', 'text-green-400');

            // Gather values
            const host = document.getElementById('hostUrl').value.replace(/\/$/, ""); 
            const method = document.getElementById('method').value;
            const path = document.getElementById('path').value;
            const queryString = document.getElementById('queryString').value;
            const apiKey = document.getElementById('apiKey').value;
            const secretKey = document.getElementById('secretKey').value;
            const rawBody = document.getElementById('jsonBody').value;
            const timestamp = document.getElementById('timestamp').value;
            const nonce = document.getElementById('nonce').value;

            // Basic validation
            if (!apiKey || !secretKey) {
                alert("Please enter your API Key and Secret Key");
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                return;
            }

            try {
                // 1. Prepare Payload
                let jsonBodyString = "";
                let parsedBody = null;

                if (rawBody && rawBody.trim().length > 0) {
                    try {
                        parsedBody = JSON.parse(rawBody);
                        jsonBodyString = JSON.stringify(parsedBody);
                    } catch (e) {
                        throw new Error("Invalid JSON in request body");
                    }
                }

                // 2. Calculate HMAC-SHA256 Signature (Web Crypto API)
                const dataToSign = `${method}\n${path}\n${queryString}\n${jsonBodyString}\n${timestamp}\n${nonce}`;
                const signature = await generateHmacSha256(secretKey, dataToSign);
                
                // 3. Format the new Blokko Auth Payload
                const authPayload = `Api-Key=${apiKey}, Timestamp=${timestamp}, Nonce=${nonce}, Signature=${signature}`;

                // 4. Debug info
                debugDiv.innerHTML = `<strong>blokko-signature:</strong> ${authPayload}`;

                // 5. Send Request (Axios)
                const url = `${host}${path}`;
                const finalUrl = queryString ? `${url}?${queryString}` : url;

                const response = await axios({
                    method: method,
                    url: finalUrl,
                    headers: {
                        'Content-Type': 'application/json',
                        'blokko-signature': authPayload
                    },
                    data: parsedBody 
                });

                // 6. Show Success
                statusDiv.innerText = `${response.status} ${response.statusText}`;
                statusDiv.className = "font-bold mt-1 text-green-400";

                output.innerText = JSON.stringify(response.data, null, 2);
                output.className = "code-font text-sm text-green-400";

            } catch (error) {
                // 7. Error Handling
                statusDiv.className = "font-bold mt-1 text-red-400";
                output.className = "code-font text-sm text-red-400";

                if (error.response) {
                    // Server Error (4xx, 5xx)
                    statusDiv.innerText = `${error.response.status} ${error.response.statusText}`;
                    output.innerText = JSON.stringify(error.response.data, null, 2);
                } else if (error.request) {
                    // Network / CORS Error
                    statusDiv.innerText = "Network Error / CORS";
                    output.innerText = "No response received. Verify:\n1. Server is running.\n2. CORS is enabled.\n3. SSL certificate is valid/accepted.";
                } else {
                    // Internal Error
                    statusDiv.innerText = "Internal Error";
                    output.innerText = error.message;
                }
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        // Helper: Web Crypto HMAC
        async function generateHmacSha256(secret, data) {
            const encoder = new TextEncoder();
            const keyData = encoder.encode(secret);
            const msgData = encoder.encode(data);

            const key = await crypto.subtle.importKey(
                "raw", keyData, { name: "HMAC", hash: "SHA-256" }, false, ["sign"]
            );

            const signatureBuffer = await crypto.subtle.sign("HMAC", key, msgData);
            const signatureArray = Array.from(new Uint8Array(signatureBuffer));
            const signatureHex = signatureArray.map(b => b.toString(16).padStart(2, '0')).join('');

            return signatureHex;
        }
    </script>
</body>
</html>
